<!DOCTYPE html>
<html>
<head>
  <title>Ladder Game</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; color: white; }
    canvas { border: 2px solid #444; }
  </style>
</head>
<body>
  <div id="info">Score: 0 | Floor: 1</div>
  <canvas id="canvas" width="700" height="500"></canvas>
  <div id="msg"></div>

  <script>
    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")
    const FLOORS = 5
    const FH = canvas.height / FLOORS
    const PX = 60
    let vy = canvas.height - FH / 2

    function fy(f) { return canvas.height - f * FH + FH / 2 }

    document.addEventListener("keydown", async (e) => {
      if (e.key === "ArrowUp")   fetch("/up")
      if (e.key === "ArrowDown") fetch("/down")
      if (e.key === "r" || e.key === "R") {
        fetch("/reset")
        document.getElementById("msg").textContent = ""
        vy = fy(1)
      }
    })

    async function loop() {
      const res = await fetch("/status")
      const s = await res.json()

      vy += (fy(s.player.floor) - vy) * 0.2

      // clear
      ctx.fillStyle = "#1a1a1a"
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      // floors
      for (let f = 1; f <= FLOORS; f++) {
        const y = canvas.height - f * FH
        ctx.strokeStyle = "#333"
        ctx.beginPath()
        ctx.moveTo(0, y + FH)
        ctx.lineTo(canvas.width, y + FH)
        ctx.stroke()
        ctx.fillStyle = "#555"
        ctx.fillText("Floor " + f, 620, y + FH - 8)
      }

      // ladder
      ctx.strokeStyle = "#777"
      ctx.lineWidth = 4
      ctx.beginPath()
      ctx.moveTo(PX, 0)
      ctx.lineTo(PX, canvas.height)
      ctx.stroke()
      ctx.lineWidth = 2
      for (let i = 0; i < canvas.height; i += 20) {
        ctx.beginPath()
        ctx.moveTo(PX - 10, i)
        ctx.lineTo(PX + 10, i)
        ctx.stroke()
      }

      // enemies
      s.enemies.forEach(e => {
        ctx.fillStyle = "#e74c3c"
        ctx.beginPath()
        ctx.arc(e.x, fy(e.floor), 15, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = "#fff"
        ctx.fillText("X", e.x - 4, fy(e.floor) + 4)
      })

      // player
      ctx.fillStyle = s.player.alive ? "#2ecc71" : "#e74c3c"
      ctx.beginPath()
      ctx.arc(PX, vy, 15, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = "#fff"
      ctx.fillText("P", PX - 4, vy + 4)

      // hud
      document.getElementById("info").textContent =
        `Score: ${s.player.score} | Floor: ${s.player.floor}`

      // game over
      if (!s.player.alive) {
        ctx.fillStyle = "rgba(0,0,0,0.6)"
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        ctx.fillStyle = "#e74c3c"
        ctx.font = "48px monospace"
        ctx.fillText("GAME OVER", 180, 240)
        ctx.fillStyle = "#fff"
        ctx.font = "20px monospace"
        ctx.fillText("Score: " + s.player.score, 290, 290)
        ctx.fillText("Press critical shift R to restart", 240, 330)
        document.getElementById("msg").textContent = ""
      }

      requestAnimationFrame(loop)
    }

    loop()
  </script>
</body>
</html>
